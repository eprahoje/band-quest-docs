<!-- @dsCard group="Components" name="Select / Dropdown" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Band Quest — Select / Dropdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<style>
  body { margin: 0; }
  .wrap { padding: var(--bq-space-6); max-width: 360px; }
  h1 { font-family: var(--bq-font-display); font-weight: 700; text-transform: uppercase;
       letter-spacing: var(--bq-tracking-display); font-size: var(--bq-text-xl); margin: 0 0 var(--bq-space-5); }
  .note { font-size: var(--bq-text-sm); color: var(--bq-text-muted); margin: 0 0 var(--bq-space-5); }
  .field__label { display:block; font-size: var(--bq-text-xs); color: var(--bq-text-muted);
    text-transform: uppercase; letter-spacing: var(--bq-tracking-caps); margin-bottom: var(--bq-space-1); }

  /* Padrão de dropdown próprio (o <select> nativo não estiliza as opções de forma
     confiável no tema escuro — daí um botão + lista custom). */
  .select { position: relative; }
  .select__button {
    width: 100%; display:flex; align-items:center; justify-content:space-between; gap: var(--bq-space-2);
    padding: var(--bq-space-2) var(--bq-space-3); font: inherit; font-size: var(--bq-text-sm);
    color: var(--bq-text); background: var(--bq-bg-inset);
    border: 1px solid var(--bq-border-strong); border-radius: var(--bq-radius-sm); cursor: pointer;
    transition: border-color var(--bq-dur-base) var(--bq-ease);
  }
  .select__button:hover { border-color: var(--bq-spotlight); }
  .select__chevron { color: var(--bq-text-faint); transition: transform var(--bq-dur-base) var(--bq-ease); }
  .select--open .select__chevron { transform: rotate(180deg); }

  .select__list {
    position: absolute; z-index: var(--bq-z-overlay); top: calc(100% + 4px); left: 0; right: 0;
    margin: 0; padding: var(--bq-space-1); list-style: none; max-height: 240px; overflow-y: auto;
    background: var(--bq-bg-elevated); border: 1px solid var(--bq-border-strong);
    border-radius: var(--bq-radius-md); box-shadow: var(--bq-shadow-lg);
  }
  .select__option {
    width: 100%; text-align: left; display:flex; align-items:center; justify-content:space-between;
    padding: var(--bq-space-2) var(--bq-space-3); font: inherit; font-size: var(--bq-text-sm);
    color: var(--bq-text); background: none; border: none; border-radius: var(--bq-radius-sm); cursor: pointer;
  }
  .select__option:hover, .select__option:focus-visible { background: var(--bq-bg-surface); outline: none; }
  .select__option[aria-selected="true"] { color: var(--bq-spotlight); font-weight: var(--bq-weight-semibold); }
  .select__option[aria-selected="true"]::after { content: "✓"; }
</style>
</head>
<body class="bq-root">
<div class="wrap">
  <h1>Select / Dropdown</h1>
  <p class="note">Lista própria do design system — opções legíveis no tema escuro,
    item selecionado em âmbar, navegável por teclado. Substitui o <code>&lt;select&gt;</code> nativo.</p>

  <span class="field__label">Gênero</span>
  <div class="select select--open">
    <button class="select__button" aria-haspopup="listbox" aria-expanded="true">
      <span>Punk</span>
      <span class="select__chevron">▾</span>
    </button>
    <ul class="select__list" role="listbox">
      <li><button class="select__option" role="option">Rock</button></li>
      <li><button class="select__option" role="option">Pop Rock</button></li>
      <li><button class="select__option" role="option" aria-selected="true">Punk</button></li>
      <li><button class="select__option" role="option">Hard Rock</button></li>
      <li><button class="select__option" role="option">Grunge</button></li>
    </ul>
  </div>
</div>
</body>
</html>
