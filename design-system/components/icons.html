<!-- @dsCard group="Components" name="Icon library" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Band Quest — Icon Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../tokens.css">
<style>
  body { margin: 0; }
  .wrap { padding: var(--bq-space-6); max-width: 720px; }
  h1 { font-family: var(--bq-font-display); font-weight: 700; text-transform: uppercase;
       letter-spacing: var(--bq-tracking-display); font-size: var(--bq-text-xl); margin: 0 0 var(--bq-space-1); }
  .sub { color: var(--bq-text-muted); font-size: var(--bq-text-sm); margin: 0 0 var(--bq-space-5); }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: var(--bq-space-3); }
  .cell { background: var(--bq-bg-surface); border: 1px solid var(--bq-border); border-radius: var(--bq-radius-md);
          padding: var(--bq-space-4) var(--bq-space-2); text-align: center; }
  .cell svg { width: 26px; height: 26px; color: var(--bq-spotlight); }
  .cell .n { font-size: var(--bq-text-xs); color: var(--bq-text-muted); margin-top: var(--bq-space-2); }
  .cell .t { display:block; font-family: var(--bq-font-mono); font-size: 10px; color: var(--bq-text-faint); }
</style>
</head>
<body class="bq-root">
<div class="wrap">
  <h1>Biblioteca de Ícones</h1>
  <p class="sub">Estilo outline (Tabler Icons). Mapeados às ações e categorias do jogo. Tamanho base 24 · stroke 2.</p>
  <div class="grid">

    <div class="cell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg><div class="n">Show ao vivo<span class="t">microphone</span></div></div>
    <div class="cell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.5"/></svg><div class="n">Gravação<span class="t">disc</span></div></div>
    <div class="cell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="19" r="2"/><circle cx="18" cy="5" r="2"/><path d="M8 19h6a4 4 0 0 0 0-8H10a4 4 0 0 1 0-8h6"/></svg><div class="n">Turnê<span class="t">route</span></div></div>
    <div class="cell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg><div class="n">Contrato<span class="t">briefcase</span></div></div>

    <div class="cell"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.2 6.6.9-4.8 4.7 1.2 6.6L12 17.8 6.1 20.4l1.2-6.6L2.5 9.1l6.6-.9z"/></svg><div class="n">Reputação<span class="t">star</span></div></div>
    <div class="cell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M14.5 9.5c-.5-1-1.5-1.5-2.5-1.5-1.4 0-2.5.8-2.5 2s1.1 1.8 2.5 2 2.5.8 2.5 2-1.1 2-2.5 2c-1 0-2-.5-2.5-1.5M12 6.5v11"/></svg><div class="n">Caixa<span class="t">coin</span></div></div>
    <div class="cell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><path d="M16 5.5a3 3 0 0 1 0 5.8M17 14c2.5.6 4 2.6 4 5.5"/></svg><div class="n">Fãs<span class="t">users</span></div></div>
    <div class="cell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 3L4 14h7l-1 7 9-11h-7z"/></svg><div class="n">Fadiga<span class="t">bolt</span></div></div>

    <div class="cell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><div class="n">Compor<span class="t">music</span></div></div>
    <div class="cell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 18 0 9 9 0 1 0-18 0M12 7v5l3 2"/></svg><div class="n">Turno<span class="t">clock</span></div></div>
    <div class="cell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5m0 14h16M8 16l4-6 3 3 5-7"/></svg><div class="n">Tendências<span class="t">trending</span></div></div>
    <div class="cell"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-4.5-7-10a4 4 0 0 1 7-2 4 4 0 0 1 7 2c0 5.5-7 10-7 10z"/></svg><div class="n">Energia<span class="t">heart</span></div></div>

  </div>
</div>
</body>
</html>
